<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Wordle</title>
    <style>
        :root {
            --bg-color: #121213;
            --text-color: #ffffff;
            --empty-border: #3a3a3c;
            --filled-border: #565758;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
            --key-bg: #818384;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh;
            overflow: hidden;
        }

        header {
            width: 100%;
            border-bottom: 1px solid var(--empty-border);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50px;
            position: relative;
        }

        h1 {
            font-size: 32px;
            margin: 0;
            letter-spacing: 2px;
            font-weight: 700;
        }

        #game-container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            height: calc(100dvh - 50px);
            padding: 10px;
            box-sizing: border-box;
        }

        #board-container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            overflow: hidden;
            position: relative;
        }

        #board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            grid-gap: 5px;
            width: 100%;
            max-width: 350px;
            aspect-ratio: 5/6;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-gap: 5px;
        }

        .tile {
            border: 2px solid var(--empty-border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            user-select: none;
            box-sizing: border-box;
        }

        .tile.active {
            border-color: var(--filled-border);
            animation: popIn 0.1s;
        }

        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes flipIn {
            0% { transform: rotateX(0); }
            50% { transform: rotateX(-90deg); }
            100% { transform: rotateX(0); }
        }

        .tile.flip {
            animation: flipIn 0.5s ease forwards;
        }

        .tile.correct { background-color: var(--correct); border-color: var(--correct); color: white; }
        .tile.present { background-color: var(--present); border-color: var(--present); color: white; }
        .tile.absent { background-color: var(--absent); border-color: var(--absent); color: white; }

        #keyboard-container {
            height: 200px;
            width: 100%;
            padding-bottom: env(safe-area-inset-bottom, 10px);
        }

        .key-row {
            display: flex;
            justify-content: center;
            width: 100%;
            margin-bottom: 8px;
            touch-action: manipulation;
        }

        .key {
            font-family: inherit;
            font-weight: bold;
            border: 0;
            padding: 0;
            margin: 0 3px;
            height: 58px;
            border-radius: 4px;
            cursor: pointer;
            background-color: var(--key-bg);
            color: var(--text-color);
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-transform: uppercase;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            transition: background-color 0.3s ease;
        }

        .key.large { flex: 1.5; font-size: 14px; }
        .key.correct { background-color: var(--correct); }
        .key.present { background-color: var(--present); }
        .key.absent { background-color: var(--absent); }

        #message {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--text-color);
            color: var(--bg-color);
            padding: 10px 15px;
            border-radius: 4px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 10;
            text-align: center;
        }

        #play-again {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--correct);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            z-index: 20;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <header>
        <h1>WORDLE</h1>
    </header>

    <div id="message"></div>
    <button id="play-again" onclick="resetGame()">PLAY AGAIN</button>

    <div id="game-container">
        <div id="board-container">
            <div id="board"></div>
        </div>
        <div id="keyboard-container"></div>
    </div>

    <script>
        let validGuesses = []; 
        let validAnswers = ["TRAIN", "HOUSE", "SMART", "WATER", "EARTH", "PLANT", "CREAM", "AUDIO"]; // Fallback if internet fails
        let targetWord = "";

        let currentRow = 0;
        let currentTile = 0;
        let currentGuess = [];
        let gameOver = false;
        let isAnimating = false;
        let isReady = false; 

        const board = document.getElementById('board');
        const keyboard = document.getElementById('keyboard-container');
        const messageBox = document.getElementById('message');
        const playAgainBtn = document.getElementById('play-again');

        const keys = [
            ['Q', 'W', 'E', 'R', 'T', 'Y', 'U', 'I', 'O', 'P'],
            ['A', 'S', 'D', 'F', 'G', 'H', 'J', 'K', 'L'],
            ['ENTER', 'Z', 'X', 'C', 'V', 'B', 'N', 'M', '⌫']
        ];

        // Fetch real Wordle dictionaries
        async function loadDictionary() {
            showMessage("Loading dictionary...", 0); 
            try {
                // Fetch the exact 2,300+ Wordle Answers
                const answersRes = await fetch('https://raw.githubusercontent.com/cfreshman/wordle-answers/main/wordle-answers-alphabetical.txt');
                const answersText = await answersRes.text();
                validAnswers = answersText.split('\n').map(word => word.trim().toUpperCase()).filter(word => word.length === 5);
                
                // Fetch the 10,000+ Allowed Guesses
                const guessesRes = await fetch('https://raw.githubusercontent.com/cfreshman/wordle-allowed-guesses/main/wordle-allowed-guesses.txt');
                const guessesText = await guessesRes.text();
                validGuesses = guessesText.split('\n').map(word => word.trim().toUpperCase()).filter(word => word.length === 5);
                
                // Combine them so answers are always accepted as guesses
                validGuesses = [...new Set([...validGuesses, ...validAnswers])];

                startGame();
            } catch (error) {
                // Fallback to local small array if fetch fails
                validGuesses = [...validAnswers]; 
                startGame();
            }
        }

        function startGame() {
            targetWord = validAnswers[Math.floor(Math.random() * validAnswers.length)];
            messageBox.style.opacity = 0; 
            isReady = true; 
        }

        function resetGame() {
            currentRow = 0;
            currentTile = 0;
            currentGuess = [];
            gameOver = false;
            playAgainBtn.style.display = 'none';
            messageBox.style.opacity = 0;
            
            // Pick a new word
            targetWord = validAnswers[Math.floor(Math.random() * validAnswers.length)];

            // Clear visual board
            const tiles = document.querySelectorAll('.tile');
            tiles.forEach(tile => {
                tile.textContent = '';
                tile.className = 'tile';
                tile.style.border = '';
            });

            // Clear visual keyboard
            const keysElements = document.querySelectorAll('.key');
            keysElements.forEach(key => {
                key.className = 'key';
                if (key.textContent === 'ENTER' || key.textContent === '⌫') {
                    key.classList.add('large');
                }
            });
        }

        function initBoard() {
            for (let i = 0; i < 6; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                row.id = `row-${i}`;
                for (let j = 0; j < 5; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.id = `tile-${i}-${j}`;
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        function initKeyboard() {
            keys.forEach(row => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'key-row';
                row.forEach(key => {
                    const button = document.createElement('button');
                    button.textContent = key;
                    button.className = 'key';
                    button.id = `key-${key}`;
                    if (key === 'ENTER' || key === '⌫') {
                        button.classList.add('large');
                    }
                    button.addEventListener('click', () => handleInput(key));
                    rowDiv.appendChild(button);
                });
                keyboard.appendChild(rowDiv);
            });
        }

        function showMessage(msg, duration = 2000) {
            messageBox.textContent = msg;
            messageBox.style.opacity = 1;
            if (duration > 0) {
                setTimeout(() => { messageBox.style.opacity = 0; }, duration);
            }
        }

        function updateTile() {
            const row = document.getElementById(`row-${currentRow}`);
            for (let i = 0; i < 5; i++) {
                const tile = row.children[i];
                tile.textContent = currentGuess[i] || '';
                if (currentGuess[i]) {
                    tile.classList.add('active');
                } else {
                    tile.classList.remove('active');
                }
            }
        }

        function handleInput(key) {
            if (gameOver || isAnimating || !isReady) return;

            if (key === '⌫' || key === 'Backspace') {
                if (currentTile > 0) {
                    currentGuess.pop();
                    currentTile--;
                    updateTile();
                }
            } else if (key === 'ENTER' || key === 'Enter') {
                checkGuess();
            } else if (/^[A-Z]$/.test(key) && currentTile < 5) {
                currentGuess.push(key);
                currentTile++;
                updateTile();
            }
        }

        function updateKeyboard(letter, status) {
            const keyElement = document.getElementById(`key-${letter}`);
            if (!keyElement) return;
            
            if (keyElement.classList.contains('correct')) return;
            if (keyElement.classList.contains('present') && status === 'absent') return;
            
            keyElement.className = `key ${status}`;
            if (letter === 'ENTER' || letter === '⌫') keyElement.classList.add('large');
        }

        function checkGuess() {
            const guessString = currentGuess.join('');
            
            if (guessString.length !== 5) {
                showMessage("Not enough letters");
                return;
            }
            
            if (!validGuesses.includes(guessString)) {
                showMessage("Not in word list");
                return;
            }

            isAnimating = true;
            const row = document.getElementById(`row-${currentRow}`);
            let targetCharCounts = {};
            
            for (let i = 0; i < 5; i++) {
                targetCharCounts[targetWord[i]] = (targetCharCounts[targetWord[i]] || 0) + 1;
            }

            const tileStatuses = new Array(5).fill('absent');

            // Pass 1: correct
            for (let i = 0; i < 5; i++) {
                if (guessString[i] === targetWord[i]) {
                    tileStatuses[i] = 'correct';
                    targetCharCounts[guessString[i]] -= 1;
                }
            }

            // Pass 2: present
            for (let i = 0; i < 5; i++) {
                if (tileStatuses[i] !== 'correct' && targetCharCounts[guessString[i]] > 0) {
                    tileStatuses[i] = 'present';
                    targetCharCounts[guessString[i]] -= 1;
                }
            }

            // Animate
            for (let i = 0; i < 5; i++) {
                const tile = row.children[i];
                setTimeout(() => {
                    tile.classList.add('flip');
                    
                    setTimeout(() => {
                        tile.classList.add(tileStatuses[i]);
                        tile.style.border = 'none';
                        updateKeyboard(guessString[i], tileStatuses[i]);
                    }, 250); 
                }, i * 300); 
            }

            // Check End Game
            setTimeout(() => {
                isAnimating = false;
                if (guessString === targetWord) {
                    showMessage("Splendid!", 0); 
                    gameOver = true;
                    playAgainBtn.style.display = 'block';
                    return;
                }

                currentRow++;
                currentTile = 0;
                currentGuess = [];

                if (currentRow === 6) {
                    showMessage(targetWord, 0);
                    gameOver = true;
                    playAgainBtn.style.display = 'block';
                }
            }, 5 * 300 + 250);
        }

        document.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();
            handleInput(key);
        });

        initBoard();
        initKeyboard();
        loadDictionary();

    </script>
</body>
</html>
