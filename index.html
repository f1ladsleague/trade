<html lang="en">
<head>

        .league-logo { max-height: 75px; margin: 0 auto 15px auto; display: block; border-radius: 6px; }

        h1 { text-align: center; text-transform: uppercase; font-weight: 700; margin: 0; }
        .login-h1-border { border-bottom: 2px solid var(--theme-color); padding-bottom: 10px; margin-bottom: 5px; transition: border-color 0.3s ease; }
        .round-info { text-align: center; color: #aaa; font-size: 18px; margin: 10px 0 20px 0; font-weight: 600; }

        .login-toggle button.toggle-active { background: var(--theme-color); color: white; }

        button.btn-primary { width: 100%; background: var(--theme-color); color: white; border: none; padding: 15px; font-size: 18px; font-weight: 700; border-radius: 6px; cursor: pointer; text-transform: uppercase; transition: 0.3s ease; }
        button.btn-primary:hover { filter: brightness(1.2); transform: translateY(-2px); }
        button:disabled { background: #555 !important; cursor: not-allowed; transform: none; color: #aaa; filter: none; }

        .hidden { display: none !important; }
        .section-box { background: #1a1a21; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333; }

        .phase-label { font-size: 13px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .phase-name { font-size: 22px; font-weight: 900; color: #ffd700; text-transform: uppercase; margin-top: 4px; }
        .countdown { font-family: monospace; font-size: 34px; font-weight: 700; color: var(--theme-color); margin-top: 6px; letter-spacing: 2px; }
        .countdown.urgent { color: #ff4444; animation: pulse 1s infinite; }
        @keyframes pulse { 50% { opacity: 0.55; } }

        .cap-pill { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid var(--theme-color); border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; }

        .driver-card { display: flex; align-items: center; gap: 12px; padding: 12px; background: var(--f1-hover); border: 2px solid transparent; border-radius: 10px; cursor: pointer; transition: 0.2s; position: relative; }

        .info-line { text-align: center; color: #aaa; font-size: 14px; font-style: italic; margin: 12px 0; }

        .rules-accordion li { margin-bottom: 8px; }

        .status-msg { text-align: center; padding: 30px 15px; color: #ccc; font-size: 16px; line-height: 1.5; }
        .big-icon { font-size: 50px; display: block; margin-bottom: 12px; }

        .bid-row.above { border-color: #00ff00; }
        .bid-row.below { border-color: #555; opacity: 0.7; }
        .bid-info { display: flex; flex-direction: column; gap: 3px; }
        .bid-team { font-weight: 700; font-size: 16px; }
        .bid-detail { font-size: 13px; color: #bbb; }
        .bid-amount { font-family: monospace; font-size: 20px; font-weight: 900; color: #00ff00; }
        .choose-btn { background: var(--theme-color); color: #fff; border: none; padding: 10px 16px; border-radius: 6px; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 13px; }

        .option-box { border: 1px solid #444; border-radius: 8px; padding: 16px; margin-bottom: 14px; }

        .option-box p { margin: 0 0 12px 0; font-size: 13px; color: #bbb; line-height: 1.4; }

        .trade-log-item { background: #14141b; border: 1px solid #333; border-left: 4px solid var(--theme-color); border-radius: 6px; padding: 10px 14px; margin-bottom: 8px; font-size: 13px; }
        .trade-log-item .to { color: #888; font-size: 12px; }

        .fee-box .fee-val { font-family: monospace; font-size: 28px; font-weight: 900; color: #ffd700; }

</head>

        try {

            });
            const t1 = Date.now();
            const dateHdr = res.headers.get('date');
            if (dateHdr) {
                // Header is floored to the second → assume ~500ms in, minus half the round-trip.
                const est = new Date(dateHdr).getTime() + 500 - (t1 - t0) / 2;
                serverOffset = est - t1;
            }
        } catch (e) { console.warn('Server time sync failed; falling back to local clock.', e); }
    }

        // ===== Driver photo system (Supabase Storage) =====
    const PHOTO_BASE = `${SUPABASE_URL}/storage/v1/object/public/driver-photos`;

    const driverCode = {

    // Build the correct team-coloured photo URL for a driver on a given team.
    function driverPhoto(driverName, teamName){
        const dc = driverCode[driverName];
        const tc = teamCode[teamName];
        if(dc && tc) return `${PHOTO_BASE}/${dc}-${tc}.png`;
        return driverImages[driverName] || '';   // fallback to old headshot if anything is missing
    }

    function getTeamColor(t){ t=(t||"").toLowerCase();
        if(t.includes("mercedes"))return"#00D7B6"; if(t.includes("red bull"))return"#4781D7";
        if(t.includes("ferrari"))return"#ED1131"; if(t.includes("mclaren"))return"#F47600";
        if(t.includes("aston"))return"#229971"; return"#e10600"; }
    function applyTheme(t){ document.documentElement.style.setProperty('--theme-color', getTeamColor(t)); }
    function normTeam(t){ return String(t||"").toLowerCase().replace(/racing|f1|team/g,"").replace(/[^a-z]/g,""); }

    // Money helpers (2dp, cents-aware)
    function round2(n){ return Math.round((Number(n)+Number.EPSILON)*100)/100; }
    function money(n){ return "$" + Number(n||0).toFixed(2); }

    // =========================================================
    // SESSION STATE
    // =========================================================
    let role="Constructor", me="";
    let constructorsData=[], sheetCapByTeam={};
    let liveDrivers=[], auctionState=null, capLedger=[];
    let _nomCache=[], _bidCache=[], _tradeCache=[];
    let _selectedTarget="", countdownTimer=null;

    // =========================================================
    // CSV PARSER
    // =========================================================
    async function fetchCSV(url){
        const u = url + (url.includes('?')?'&':'?') + "nocache=" + Date.now();
        const r = await fetch(u, {cache:"no-store"});
        const txt = (await r.text()).replace(/\r/g,'');
        const rows=[];
        txt.split('\n').forEach(line=>{
            if(!line.trim())return;
            const arr=[]; let q=false, cell='';
            for(let i=0;i<line.length;i++){ const c=line[i],n=line[i+1];
                if(c==='"'&&q&&n==='"'){cell+=c;i++;continue;}
                if(c==='"'){q=!q;continue;}
                if(c===','&&!q){arr.push(cell.trim());cell='';continue;}
                cell+=c; }
            arr.push(cell.trim()); rows.push(arr);
        });
        return rows.slice(1);
    }
    function parseSheetNumber(v){ let s=String(v||"0").trim();
        let neg=s.includes('-')||(s.includes('(')&&s.includes(')'));
        let n=parseFloat(s.replace(/[^0-9.]/g,"")); if(isNaN(n))return 0; return neg?-n:n; }

    // Live cap = Sheet starting cap + SUM(ledger deltas) for that team.
    function liveCap(team){
        let base = sheetCapByTeam[normTeam(team)] || 0;
        capLedger.filter(l=>normTeam(l.constructor)===normTeam(team)).forEach(l=> base += Number(l.delta));
        return round2(base);
    }

    function leagueFees(){
        return round2(capLedger.filter(l=>l.constructor===LEAGUE_KEY).reduce((s,l)=>s+Number(l.delta),0));
    }

    }

            supabaseClient.channel('auction-live')
                .on('postgres_changes',{event:'*',schema:'public',table:'auction_state'}, onRealtime)
                .on('postgres_changes',{event:'*',schema:'public',table:'auction_nominations'}, onRealtime)
                .on('postgres_changes',{event:'*',schema:'public',table:'auction_bids'}, onRealtime)
                .on('postgres_changes',{event:'*',schema:'public',table:'auction_drivers'}, onRealtime)
                .on('postgres_changes',{event:'*',schema:'public',table:'auction_cap_ledger'}, onRealtime)
                .subscribe();
        } catch(e){
            console.error(e);
            document.getElementById('login-status').innerText = "Could not reach database — check Supabase keys / Realtime.";
        }
        try {
            constructorsData = await fetchCSV(CONSTRUCTORS_CSV_URL);
            constructorsData.forEach(c=>{ const team=c[0]; if(!team)return;
                sheetCapByTeam[normTeam(team)] = parseSheetNumber(c[6]); });
        } catch(e){ console.warn("Could not load caps from Sheet:", e); }
        populateLoginDropdowns();
    };

    async function onRealtime(){ await refreshAll(); updateLoginStatus();
        if(!document.getElementById('app-section').classList.contains('hidden')) render(); }

    async function refreshAll(){
        const [st,dr,led,nom,bid,tr] = await Promise.all([
            supabaseClient.from('auction_state').select('*').order('id',{ascending:false}).limit(1),
            supabaseClient.from('auction_drivers').select('*').order('id',{ascending:true}),
            supabaseClient.from('auction_cap_ledger').select('*'),
            supabaseClient.from('auction_nominations').select('*'),
            supabaseClient.from('auction_bids').select('*'),
            supabaseClient.from('auction_trades').select('*')
        ]);
        auctionState = (st.data && st.data[0]) || auctionState;
        liveDrivers  = dr.data || liveDrivers;
        capLedger    = led.data || [];
        _nomCache    = nom.data || [];
        _bidCache    = bid.data || [];
        _tradeCache  = tr.data  || [];
    }

    function updateLoginStatus(){
        const el=document.getElementById('login-status'); if(!el)return;
        el.innerText = (auctionState && auctionState.is_active)
            ? `Trade LIVE — Round ${auctionState.round_no}`
            : "Trade window not yet started by Admin.";
    }

    function allTeams(){
        let teams = (liveDrivers && liveDrivers.length) ? [...new Set(liveDrivers.map(d=>d.original_team))] : [];
        if(!teams.length) teams = Object.keys(constructorPasswords);
        return teams.sort();
    }

    function populateLoginDropdowns(){
        const cSel=document.getElementById('constructor-select');
        const dSel=document.getElementById('driver-select');
        cSel.innerHTML='<option value="">Select your Team…</option>';
        dSel.innerHTML='<option value="">Select your Driver…</option>';
        allTeams().forEach(t=> cSel.innerHTML += `<option value="${t}">${t}</option>`);
        let drivers = (liveDrivers && liveDrivers.length) ? liveDrivers.map(d=>d.driver) : Object.keys(driverPasswords);
        drivers.forEach(d=> dSel.innerHTML += `<option value="${d}">${d}</option>`);
    }

    // =========================================================
    // LOGIN
    // =========================================================
    async function login(){
        if(role==='Constructor'){
            const team=document.getElementById('constructor-select').value;
            const pass=document.getElementById('constructor-pass').value;
            if(!team || constructorPasswords[team]!==pass){ alert("Incorrect team or password."); return; }
            me=team; applyTheme(team);
        } else if(role==='Driver'){
            const drv=document.getElementById('driver-select').value;
            const pass=document.getElementById('driver-pass').value;
            if(!drv || driverPasswords[drv]!==pass){ alert("Incorrect driver or password."); return; }
            me=drv;
            const ld=liveDrivers.find(x=>x.driver===drv); applyTheme(ld?ld.current_team:"");
        } else {
            const pass=document.getElementById('admin-pass').value;
            if(pass!==ADMIN_PASSWORD){ alert("Incorrect admin password."); return; }
            me="Admin"; applyTheme("");
        }
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('app-section').classList.remove('hidden');
        document.getElementById('welcome-title').innerText = role==='Admin' ? "Admin Control" : me;
        render();
    }
    function logout(){ window.location.reload(); }

    // =========================================================
    // COUNTDOWN
    // =========================================================
    function startCountdown(){
        if(countdownTimer) clearInterval(countdownTimer);
        const el=document.getElementById('countdown');
        const tick=()=>{
            if(!auctionState || !auctionState.phase_deadline){ el.innerText="--:--"; el.classList.remove('urgent'); return; }
            const diff=new Date(auctionState.phase_deadline).getTime() - serverNow();   // server-synced
            if(diff<=0){
                el.innerText="00:00";
                el.classList.add('urgent');
                // Only the admin drives the engine, and ONLY after the grace window,
                // so genuine last-second submissions are still counted.
                if(role==='Admin' && diff <= -GRACE_MS) autoAdvance();
                return;
            }
            const m=Math.floor(diff/60000), s=Math.floor((diff%60000)/1000);
            el.innerText=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            el.classList.toggle('urgent', diff<30000);
        };
        tick(); countdownTimer=setInterval(tick,250);   // 250ms → snaps back instantly after tab throttling
    }

    // =========================================================
    // MASTER RENDER
    // =========================================================
    function render(){
        updateLoginStatus();
        const phase = auctionState ? auctionState.phase : 'idle';
        document.getElementById('phase-name').innerText = phaseLabel(phase);
        startCountdown();

        const capPill=document.getElementById('cap-pill');
        if(role==='Constructor'){ capPill.style.display='flex';
            document.getElementById('cap-value').innerText = money(liveCap(me)); }
        else capPill.style.display='none';

        const region=document.getElementById('content-region');
        if(role==='Admin'){
            region.innerHTML = renderAdmin(phase);
        } else if(role==='Driver'){
            region.innerHTML = capsBoardHtml() + renderDriver(phase) + (phase==='complete' ? '' : renderTradeLog("Trade History"));
        } else {
            region.innerHTML = capsBoardHtml() + renderConstructor(phase) + (phase==='complete' ? '' : renderTradeLog("Trade History"));
        }
    }

    function phaseLabel(p){ return {
        idle:"Awaiting Start", nominate:"Silent Nomination", bidding:"Final Bidding",
        settlement:"Trade Settlement", veto:"Driver Veto", complete:"Trade Window Closed"
    }[p] || p; }

    // =========================================================
    // LIVE CAPS BOARD (colours + logos)
    // =========================================================
    function capsBoardHtml(){
        let html='<div class="section-box"><div class="caps-title">💰 Live Budget Caps</div><div class="caps-grid">';
        allTeams().forEach(t=>{
            const c=getTeamColor(t);
            const mineCls = (role==='Constructor' && t===me) ? ' me-highlight' : '';
            html+=`<div class="cap-card${mineCls}" style="--tc:${c}">
                <img src="${teamLogos[t]||''}" alt="${t}">
                <span class="tname">${t}</span>
                <span class="tval">${money(liveCap(t))}</span>
            </div>`;
        });
        return html+'</div></div>';
    }

    // =========================================================
    // DRIVER LINE-UP GRID
    // =========================================================
    function driverGridHtml(opts={}){
        let html='<div class="driver-grid">';
        liveDrivers.forEach(d=>{
            const cfg=tierConfig[d.driver]||{tier:d.tier,veto:d.veto_fee};
            const isMineOwn = (role==='Constructor' && d.current_team===me);
            const locked=d.locked;
            let cls='driver-card';
            if(locked) cls+=' locked';
            if(opts.selectable && !locked && !(opts.excludeTeam && isMineOwn) && opts.selectedName===d.driver) cls+=' selected';
            if(opts.selectable && (locked || (opts.excludeTeam && isMineOwn))) cls+=' disabled';
            if(isMineOwn) cls+=' mine';
            const onclick = (opts.selectable && !locked && !(opts.excludeTeam && isMineOwn))
                ? `onclick="selectTarget('${d.driver.replace(/'/g,"")}')"` : '';
            const corner = locked ? `<span class="lock-tag">Locked</span>` : '';
            html+=`<div class="${cls}" ${onclick}>
                <div class="avatar-wrapper"><img class="driver-avatar" src="${driverPhoto(d.driver, d.current_team)}" alt="${d.driver}"></div>
                <div class="driver-meta">
                    <span class="driver-name">${d.driver}</span>
                    <span class="driver-team"><img src="${teamLogos[d.current_team]||''}">${d.current_team}</span>
                    <span class="tier-badge">Tier ${cfg.tier}</span>
                </div>${corner}
            </div>`;
        });
        return html+'</div>';
    }
    window.selectTarget=function(name){ _selectedTarget=name; render(); };

    // =========================================================
    // CONSTRUCTOR VIEW
    // =========================================================
    function renderConstructor(phase){
        if(phase==='idle') return statusMsg("⏳","The trade window hasn't started yet. Wait for the Admin to open the first nomination round.");
        if(phase==='complete') return renderTradeLog("🏁 The Mid-Season Trade Window is closed.");

        if(phase==='nominate'){
            const myDrivers=liveDrivers.filter(d=>d.current_team===me && !d.locked);
            const already=_nomCache.find(n=>n.constructor===me && n.round_no===auctionState.round_no);
            if(already){
                return `<div class="section-box"><div class="status-msg"><span class="big-icon">✅</span>
                    Your nomination is locked in for this round:<br><br>
                    <strong>${already.target_driver}</strong> — Bid ${money(already.cash_bid)} + ${already.offered_driver}
                    <br><br><span class="info-line">Waiting for other constructors & the timer…</span></div></div>`;
            }
            return `
            ${rulesBox()}
            <div class="section-box">
                <h1 style="font-size:18px;color:var(--theme-color);text-align:center;">Nominate a Driver to Target</h1>
                <p class="info-line">Pick ONE un-locked driver you don't own. Your nomination is silent.</p>
                ${driverGridHtml({selectable:true, selectedName:_selectedTarget, excludeTeam:true})}
                <div style="margin-top:16px;">
                    <label style="font-size:13px;color:#aaa;">Cash Bid (max ${money(liveCap(me))}) — cents allowed</label>
                    <input type="number" id="nom-cash" placeholder="e.g. 100.01" min="0" step="0.01" max="${liveCap(me)}">
                    <label style="font-size:13px;color:#aaa;">Driver from your team to offer in swap</label>
                    <select id="nom-swap"><option value="">Select your driver…</option>
                        ${myDrivers.map(d=>`<option value="${d.driver}">${d.driver} (Tier ${(tierConfig[d.driver]||{}).tier})</option>`).join('')}
                    </select>
                </div>
                <button class="btn-primary" style="margin-top:14px;" onclick="submitNomination()">Submit Silent Nomination</button>
            </div>`;
        }

        if(phase==='bidding'){
            const t=auctionState.target_driver;
            const iAmSeller=liveDrivers.find(d=>d.driver===t)?.current_team===me;
            const iNominated=_nomCache.find(n=>n.constructor===me && n.round_no===auctionState.round_no);
            const iNominatedTarget=iNominated && iNominated.target_driver===t;
            const alreadyBid=_bidCache.find(b=>b.constructor===me && b.target_driver===t && b.round_no===auctionState.round_no);

            if(iAmSeller) return statusMsg("🛡️",`You own <strong>${t}</strong>. Sit tight — sealed bids are coming in. You'll get to decide once bidding closes.`);
            if(!iNominated) return statusMsg("🚫","You didn't nominate this round, so you're barred from bidding in this cycle.");
            if(iNominatedTarget) return statusMsg("🔒",`Your original nomination for <strong>${t}</strong> is locked and counts as your bid. Waiting for the timer…`);
            if(alreadyBid) return statusMsg("✅",`Your final bid on <strong>${t}</strong> is locked: ${money(alreadyBid.cash_bid)} + ${alreadyBid.offered_driver}.`);

            const myDrivers=liveDrivers.filter(d=>d.current_team===me && !d.locked);
            return `<div class="section-box">
                <h1 style="font-size:18px;color:var(--theme-color);text-align:center;">Final Bid — Target: ${t}</h1>
                <p class="info-line">You nominated another driver but participated, so you may place ONE sealed bid here.</p>
                <label style="font-size:13px;color:#aaa;">Cash Bid (max ${money(liveCap(me))}) — cents allowed</label>
                <input type="number" id="bid-cash" placeholder="e.g. 100.01" min="0" step="0.01" max="${liveCap(me)}">
                <label style="font-size:13px;color:#aaa;">Driver to offer in swap</label>
                <select id="bid-swap"><option value="">Select your driver…</option>
                    ${myDrivers.map(d=>`<option value="${d.driver}">${d.driver}</option>`).join('')}
                </select>
                <button class="btn-primary" style="margin-top:14px;" onclick="submitBid()">Submit Final Bid</button>
            </div>`;
        }

        if(phase==='settlement'){
            const t=auctionState.target_driver;
            const iAmSeller=liveDrivers.find(d=>d.driver===t)?.current_team===me;
            if(iAmSeller) return renderSellerDecision(t);
            return statusMsg("⚖️",`Bids are in for <strong>${t}</strong>. The selling constructor is deciding. Hang tight…`);
        }

        if(phase==='veto') return statusMsg("🏁",`Trade for <strong>${auctionState.target_driver}</strong> agreed — pending the driver's veto decision (2 min).`);
        return "";
    }

    // Seller decision — enforces "must sell to HIGHEST if within cap; choose among above-cap bids if priced out"
    function renderSellerDecision(t){
        const bids=allBidsForTarget(t);
        if(bids.length===0) return statusMsg("🤷","No valid bids were received for this driver. The round will reset.");
        const rofr=liveCap(me);
        const sorted=[...bids].sort((a,b)=>b.cash_bid-a.cash_bid);
        const topBid=sorted[0].cash_bid;
        const pricedOut = topBid>rofr;   // cannot exercise ROFR

        let html=`<div class="section-box"><h1 style="font-size:18px;color:var(--theme-color);text-align:center;">Settle ${t}</h1>
            <p class="info-line">Your ROFR Amount (live cap) = ${money(rofr)}. Highest bid = ${money(topBid)}.</p><div style="margin:12px 0;">`;

        sorted.forEach(b=>{
            const isAbove=b.cash_bid>rofr;
            // Case (within cap): only the HIGHEST bid may be sold to. Case (priced out): only bids ABOVE cap.
            const sellable = pricedOut ? isAbove : (b.cash_bid===topBid);
            html+=`<div class="bid-row ${isAbove?'above':'below'}">
                <div class="bid-info"><span class="bid-team">${b.constructor}</span>
                    <span class="bid-detail">Package: ${money(b.cash_bid)} + ${b.offered_driver}</span></div>
                <div style="display:flex;align-items:center;gap:12px;">
                    <span class="bid-amount">${money(b.cash_bid)}</span>
                    ${sellable?`<button class="choose-btn" onclick="acceptSale('${b.constructor}',${b.cash_bid},'${b.offered_driver}')">Sell</button>`:''}
                </div></div>`;
        });
        html+='</div>';

        if(!pricedOut){
            html+=`<div class="option-box"><h3>Option A — Match &amp; Defend (ROFR)</h3>
                <p>Pay the top bid (${money(topBid)}) to the League, keep ${t}. Your cap drops by ${money(topBid)} and ${t} becomes LOCKED.</p>
                <button class="btn-primary" onclick="matchDefend(${topBid})">Match &amp; Defend (${money(topBid)})</button></div>
                <p class="info-line">…or hit “Sell” to make a Voluntary Sale. You may only sell to the <strong>highest</strong> bidder (${sorted[0].constructor} — ${money(topBid)}).</p>`;
        } else {
            html+=`<div class="admin-warn">You are PRICED OUT — the top bid exceeds your cap, so you cannot exercise ROFR and MUST sell. You may choose any bidder who bid <strong>above</strong> your ROFR (${money(rofr)}).</div>`;
        }
        return html+'</div>';
    }

    // =========================================================
    // DRIVER VIEW
    // =========================================================
    function renderDriver(phase){
        const meDrv=liveDrivers.find(d=>d.driver===me);
        if(phase==='veto' && auctionState.target_driver===me && auctionState.winning_team){
            const cfg=tierConfig[me]||{veto:meDrv?meDrv.veto_fee:0};
            return `<div class="section-box"><h1 style="font-size:18px;color:var(--theme-color);text-align:center;">You've Been Traded!</h1>
                <p class="info-line">${auctionState.seller_team} → <strong>${auctionState.winning_team}</strong> for ${money(auctionState.winning_bid)} (swap: ${auctionState.winning_swap}).</p>
                <div class="option-box"><h3>Accept the Trade</h3><p>You join ${auctionState.winning_team}. You'll be LOCKED for the rest of the window.</p>
                    <button class="btn-primary" onclick="driverAccept()">Accept Trade</button></div>
                <div class="option-box" style="border-color:#ff4444;"><h3>Veto (pay $${cfg.veto})</h3>
                    <p>Pay your Tier veto fee from personal funds to block the trade & stay put. You'll be LOCKED either way.</p>
                    <button class="btn-primary" style="background:#ff4444;" onclick="driverVeto(${cfg.veto})">Veto — Pay $${cfg.veto}</button></div></div>`;
        }
        if(meDrv && meDrv.locked) return statusMsg("🔒",`You are LOCKED — no further trades affect you. Current team: <strong>${meDrv.current_team}</strong>.`);
        return statusMsg("👀",`Nothing needs your action right now. If a bid is accepted for you, your veto decision appears here. Current team: <strong>${meDrv?meDrv.current_team:'—'}</strong>.`);
    }

    // =========================================================
    // ADMIN VIEW
    // =========================================================
    function renderAdmin(phase){
        const activeUnlocked=liveDrivers.filter(d=>!d.locked).length;
        let html=`<div class="section-box"><h1 style="font-size:18px;color:var(--theme-color);text-align:center;">Phase Control</h1>
            <p class="info-line">Round ${auctionState?auctionState.round_no:1} • Phase: ${phaseLabel(phase)} • ${activeUnlocked} drivers still tradeable</p>`;
        if(phase==='idle' || phase==='complete'){
            html += activeUnlocked>0
                ? `<button class="btn-primary" onclick="adminStartRound()">▶ Start Nomination Round (2:00)</button>`
                : `<div class="admin-warn">All drivers processed — the trade window is complete.</div>`;
        } else {
            html+=`<div class="admin-warn">Round in progress — auto-advancing on timers. Use override only if stuck.</div>
                   <button class="btn-primary" style="background:#555;" onclick="autoAdvance()">⏭ Force Advance Phase</button>
                   <button class="btn-primary" style="background:#ff4444;margin-top:10px;" onclick="adminCancelRound()">✖ Cancel / Reset This Round</button>`;
        }
        html+=`<div style="margin-top:18px;padding-top:16px;border-top:1px dashed #444;">
                   <button class="btn-primary" style="background:#8b0000;" onclick="adminFullReset()">🗑️ RESET EVERYTHING (Wipe Database)</button>
                   <p class="info-line" style="margin-top:8px;">Deletes all nominations, bids, cap changes & trades, unlocks every driver, and restores original teams.</p>
               </div>`;
        html+='</div>';

        // League fee tally (ADMIN ONLY)
        html+=`<div class="section-box"><h3 style="color:#ffd700;text-align:center;margin-top:0;">🏦 League Trade Fees (Admin Only)</h3>
            <div class="fee-box"><div class="phase-label">Total Accrued</div><div class="fee-val">${money(leagueFees())}</div></div>
            <p class="info-line">10% of every completed trade + full ROFR match amounts. Not visible to teams.</p></div>`;

        // Live caps board
        html+=capsBoardHtml();

        if(phase==='nominate'){
            const tally=tallyNominations();
            html+=`<div class="section-box"><h3 style="color:var(--theme-color);">Live Nomination Tally</h3>`;
            const keys=Object.keys(tally).sort((a,b)=>tally[b]-tally[a]);
            html+= keys.length? keys.map(k=>`<div class="bid-row"><span class="bid-team">${k}</span><span class="bid-amount">${tally[k]} nom${tally[k]>1?'s':''}</span></div>`).join('')
                : `<p class="info-line">No nominations yet.</p>`;
            html+='</div>';
        }
        if(phase==='settlement'){
            html+=`<div class="section-box"><h3 style="color:var(--theme-color);">Sealed Bids — ${auctionState.target_driver}</h3>`;
            const bids=allBidsForTarget(auctionState.target_driver).sort((a,b)=>b.cash_bid-a.cash_bid);
            html+= bids.length? bids.map(b=>`<div class="bid-row"><div class="bid-info"><span class="bid-team">${b.constructor}</span><span class="bid-detail">+ ${b.offered_driver}</span></div><span class="bid-amount">${money(b.cash_bid)}</span></div>`).join('')
                : `<p class="info-line">No bids.</p>`;
            html+=`<p class="info-line">If the seller doesn't act, the driver auto-sells to the highest bidder.</p></div>`;
        }
        html+=renderTradeLog("Trade History");
        return html;
    }

    // =========================================================
    // HELPERS
    // =========================================================
    function tallyNominations(){
        const t={}; _nomCache.filter(n=>n.round_no===auctionState.round_no)
            .forEach(n=>{ t[n.target_driver]=(t[n.target_driver]||0)+1; }); return t;
    }
    function allBidsForTarget(t){
        const map={};
        _nomCache.filter(n=>n.round_no===auctionState.round_no && n.target_driver===t)
            .forEach(n=>map[n.constructor]={constructor:n.constructor,cash_bid:Number(n.cash_bid),offered_driver:n.offered_driver});
        _bidCache.filter(b=>b.round_no===auctionState.round_no && b.target_driver===t)
            .forEach(b=>map[b.constructor]={constructor:b.constructor,cash_bid:Number(b.cash_bid),offered_driver:b.offered_driver});
        return Object.values(map);
    }
    function statusMsg(icon,txt){ return `<div class="section-box"><div class="status-msg"><span class="big-icon">${icon}</span>${txt}</div></div>`; }
    function rulesBox(){ return `<details class="rules-accordion"><summary style="color:var(--theme-color);">Trade Rules</summary><ul>
        <li>Submit exactly ONE silent nomination: an un-locked driver you don't own + cash bid (cents allowed) + one of your own drivers to swap.</li>
        <li>Most-nominated driver is auctioned first (ties: championship points → tier → Admin draw).</li>
        <li>Fail to nominate = barred from all bidding this cycle.</li>
        <li>Bid within seller's cap: seller must sell to the <strong>highest</strong> bidder OR Match &amp; Defend (pay to League, driver locked).</li>
        <li>Bid above seller's cap: seller is priced out & must sell, choosing among bids above their cap.</li>
        <li>A 10% League fee applies to every completed trade (seller receives 90% of the bid).</li>
        <li>Traded driver may Accept or Veto (pay tier fee). Either way they're LOCKED.</li>
        <li><strong>Timeouts:</strong> if you don't act in time, the trade goes through to the highest bidder.</li></ul></details>`; }
    function renderTradeLog(title){
        let html=`<div class="section-box"><h3 style="color:var(--theme-color);text-align:center;">${title}</h3>`;
        if(_tradeCache.length===0) html+=`<p class="info-line">No trades processed yet.</p>`;
        _tradeCache.slice().reverse().forEach(tr=>{
            let line='';
            if(tr.outcome==='traded') line=`<strong>${tr.driver_out}</strong> → ${tr.buyer_team} for ${money(tr.cash_amount)} (swap in: ${tr.driver_in})`;
            else if(tr.outcome==='rofr_defended') line=`${tr.seller_team} defended <strong>${tr.driver_out}</strong> (paid ${money(tr.cash_amount)})`;
            else if(tr.outcome==='vetoed') line=`<strong>${tr.driver_out}</strong> VETOED the trade (fee $${Number(tr.veto_fee_paid).toFixed(0)})`;
            html+=`<div class="trade-log-item">${line}<div class="to">Round ${tr.round_no}</div></div>`;
        });
        return html+'</div>';
    }

    // =========================================================
    // ACTION HANDLERS
    // =========================================================
    window.submitNomination = async function(){
        const cash=round2(parseFloat(document.getElementById('nom-cash').value)||0);
        const swap=document.getElementById('nom-swap').value;
        if(!_selectedTarget){ alert("Select a driver to target."); return; }
        if(!swap){ alert("Choose one of your own drivers to offer."); return; }
        if(cash>liveCap(me)){ alert("Bid exceeds your budget cap."); return; }

        await refreshAll();                                     // re-check latest server state
        if(auctionState.phase!=='nominate' || !withinWindow()){
            alert("The nomination window has just closed — your entry was not accepted."); render(); return;
        }
        const {error}=await supabaseClient.from('auction_nominations').insert([{
            round_no:auctionState.round_no, constructor:me,
            target_driver:_selectedTarget, cash_bid:cash, offered_driver:swap }]);
        if(error){ alert("Could not save nomination (already nominated this round?)."); return; }
        _selectedTarget=""; await refreshAll(); render();
    };

    window.submitBid = async function(){
        const cash=round2(parseFloat(document.getElementById('bid-cash').value)||0);
        const swap=document.getElementById('bid-swap').value;
        if(!swap){ alert("Choose a driver to offer."); return; }
        if(cash>liveCap(me)){ alert("Bid exceeds your budget cap."); return; }

        await refreshAll();                                     // re-check latest server state
        if(auctionState.phase!=='bidding' || !withinWindow()){
            alert("The bidding window has just closed — your bid was not accepted."); render(); return;
        }
        const t=auctionState.target_driver;
        const {error}=await supabaseClient.from('auction_bids').insert([{
            round_no:auctionState.round_no, target_driver:t, constructor:me,
            cash_bid:cash, offered_driver:swap }]);
        if(error){ alert("Could not save bid (already bid?)."); return; }
        await refreshAll(); render();
    };

    // Match & Defend: seller pays FULL top bid to League, driver LOCKED, no move.
    window.matchDefend = async function(topBid){
        await refreshAll(); if(auctionState.phase!=='settlement'){ render(); return; }
        const t=auctionState.target_driver;
        topBid=round2(topBid);
        if(!confirm(`Match ${money(topBid)} to keep ${t}? Your cap drops by ${money(topBid)} (all to the League) and ${t} locks.`)) return;
        await supabaseClient.from('auction_cap_ledger').insert([
            {round_no:auctionState.round_no,constructor:me,delta:-topBid,reason:'rofr_defend'},
            {round_no:auctionState.round_no,constructor:LEAGUE_KEY,delta:topBid,reason:'fee'}
        ]);
        await supabaseClient.from('auction_drivers').update({locked:true,updated_at:new Date().toISOString()}).eq('driver',t);
        await supabaseClient.from('auction_trades').insert([{round_no:auctionState.round_no,target_driver:t,seller_team:me,cash_amount:topBid,driver_out:t,outcome:'rofr_defended'}]);
        await advanceToNextOrEnd();
    };

    window.acceptSale = async function(buyer,cash,swap){
        await refreshAll(); if(auctionState.phase!=='settlement'){ render(); return; }
        const t=auctionState.target_driver;
        cash=round2(cash);
        if(!confirm(`Sell ${t} to ${buyer} for ${money(cash)} (you receive ${money(round2(cash-round2(cash*LEAGUE_FEE_RATE)))} after 10% League fee, and get ${swap})?`)) return;
        const deadline=new Date(serverNow()+VETO_SECS*1000).toISOString();
        await supabaseClient.from('auction_state').update({
            phase:'veto', winning_team:buyer, winning_bid:cash, winning_swap:swap, phase_deadline:deadline
        }).eq('id',auctionState.id);
        await refreshAll(); render();
    };

    window.driverAccept = async function(){
        await refreshAll(); if(auctionState.phase!=='veto'){ render(); return; }
        const s=auctionState, t=s.target_driver;
        await executeTrade(s.seller_team, s.winning_team, t, s.winning_swap, Number(s.winning_bid));
        await supabaseClient.from('auction_trades').insert([{round_no:s.round_no,target_driver:t,seller_team:s.seller_team,buyer_team:s.winning_team,cash_amount:Number(s.winning_bid),driver_in:s.winning_swap,driver_out:t,outcome:'traded'}]);
        await advanceToNextOrEnd();
    };

    window.driverVeto = async function(fee){
        await refreshAll(); if(auctionState.phase!=='veto'){ render(); return; }
        const s=auctionState, t=s.target_driver;
        await supabaseClient.from('auction_drivers').update({locked:true,updated_at:new Date().toISOString()}).eq('driver',t);
        await supabaseClient.from('auction_trades').insert([{round_no:s.round_no,target_driver:t,seller_team:s.seller_team,buyer_team:s.winning_team,cash_amount:Number(s.winning_bid),outcome:'vetoed',veto_fee_paid:fee,driver_out:t}]);
        await advanceToNextOrEnd();
    };

    // Core swap with 10% League fee:
    //   buyer cap -= cash ; seller cap += (cash - 10% fee) ; League += 10% fee
    async function executeTrade(seller,buyer,target,swapDriver,cash){
        cash=round2(cash);
        const fee=round2(cash*LEAGUE_FEE_RATE);
        const toSeller=round2(cash-fee);
        await supabaseClient.from('auction_cap_ledger').insert([
            {round_no:auctionState.round_no,constructor:buyer, delta:-cash,     reason:'buy'},
            {round_no:auctionState.round_no,constructor:seller,delta: toSeller, reason:'sell'},
            {round_no:auctionState.round_no,constructor:LEAGUE_KEY,delta: fee,   reason:'fee'}
        ]);
        await supabaseClient.from('auction_drivers').update({current_team:buyer,locked:true,updated_at:new Date().toISOString()}).eq('driver',target);
        await supabaseClient.from('auction_drivers').update({current_team:seller,updated_at:new Date().toISOString()}).eq('driver',swapDriver);
    }

    // =========================================================
    // ADMIN / PHASE ENGINE
    // =========================================================
    window.adminStartRound = async function(){
        const roundNo = (_tradeCache.length===0) ? (auctionState.round_no||1) : (auctionState.round_no+1);
        const deadline=new Date(serverNow()+NOMINATE_SECS*1000).toISOString();
        await supabaseClient.from('auction_state').update({
            is_active:true, round_no:roundNo, phase:'nominate',
            target_driver:null, seller_team:null, winning_team:null, winning_bid:null, winning_swap:null,
            phase_deadline:deadline
        }).eq('id',auctionState.id);
        await refreshAll(); render();
    };

    window.adminCancelRound = async function(){
        if(!confirm("Reset this round? Nominations & bids for the current round will be cleared and the trade set back to idle.")) return;
        await supabaseClient.from('auction_nominations').delete().eq('round_no',auctionState.round_no);
        await supabaseClient.from('auction_bids').delete().eq('round_no',auctionState.round_no);
        await supabaseClient.from('auction_state').update({
            is_active:false, phase:'idle', target_driver:null, seller_team:null,
            winning_team:null, winning_bid:null, winning_swap:null, phase_deadline:null
        }).eq('id',auctionState.id);
        await refreshAll(); render();
    };

    window.adminFullReset = async function(){
        if(!confirm("⚠️ FULL RESET\n\nThis deletes ALL nominations, bids, cap changes and trades, unlocks every driver, and restores original teams.\n\nContinue?")) return;
        if(!confirm("Are you absolutely sure? This cannot be undone.")) return;
        try {
            await supabaseClient.from('auction_nominations').delete().gte('id', 0);
            await supabaseClient.from('auction_bids').delete().gte('id', 0);
            await supabaseClient.from('auction_cap_ledger').delete().gte('id', 0);
            await supabaseClient.from('auction_trades').delete().gte('id', 0);
            await refreshAll();
            for(const d of liveDrivers){
                await supabaseClient.from('auction_drivers')
                    .update({ current_team: d.original_team, locked: false, updated_at: new Date().toISOString() })
                    .eq('id', d.id);
            }
            await supabaseClient.from('auction_state').update({
                is_active:false, round_no:1, phase:'idle',
                target_driver:null, seller_team:null,
                winning_team:null, winning_bid:null, winning_swap:null,
                phase_deadline:null, updated_at:new Date().toISOString()
            }).eq('id', auctionState.id);
            await refreshAll();
            populateLoginDropdowns();
            render();
            alert("✅ Database reset. Everything is back to the pre-trade state.");
        } catch(e){
            console.error("Full reset failed:", e);
            alert("⚠️ Reset hit an error — check the console. The ledger/trades tables may need delete RLS policies.");
        }
    };

    let _advancing=false;
    async function autoAdvance(){
        if(_advancing) return; _advancing=true;
        try{
            await refreshAll();
            const p=auctionState.phase;

            if(p==='nominate'){
                const tally=tallyNominations();
                const keys=Object.keys(tally);
                if(keys.length===0){
                    await supabaseClient.from('auction_state').update({phase:'idle',phase_deadline:null,is_active:false}).eq('id',auctionState.id);
                    await refreshAll(); render(); return;
                }
                const max=Math.max(...keys.map(k=>tally[k]));
                let leaders=keys.filter(k=>tally[k]===max);
                let target=leaders[0];
                if(leaders.length>1 && role==='Admin'){
                    const pick=prompt(`Tie between: ${leaders.join(', ')}.\nType the driver to process first:`,leaders[0]);
                    if(pick && leaders.includes(pick.trim())) target=pick.trim();
                }
                const seller=liveDrivers.find(d=>d.driver===target).current_team;
                const deadline=new Date(serverNow()+DECISION_SECS*1000).toISOString();
                await supabaseClient.from('auction_state').update({phase:'bidding',target_driver:target,seller_team:seller,phase_deadline:deadline}).eq('id',auctionState.id);
            }
            else if(p==='bidding'){
                const t=auctionState.target_driver;
                const bids=allBidsForTarget(t);
                if(bids.length===0){
                    await supabaseClient.from('auction_state').update({phase:'idle',phase_deadline:null,is_active:false}).eq('id',auctionState.id);
                } else {
                    const deadline=new Date(serverNow()+DECISION_SECS*1000).toISOString();
                    await supabaseClient.from('auction_state').update({phase:'settlement',phase_deadline:deadline}).eq('id',auctionState.id);
                }
            }
            else if(p==='settlement'){
                // DEFAULT (seller didn't act): AUTO-SELL to the HIGHEST bidder. No auto-defend.
                const t=auctionState.target_driver;
                const bids=allBidsForTarget(t);
                if(bids.length===0){
                    await supabaseClient.from('auction_state').update({phase:'idle',phase_deadline:null,is_active:false}).eq('id',auctionState.id);
                } else {
                    const best=bids.sort((a,b)=>b.cash_bid-a.cash_bid)[0];
                    const deadline=new Date(serverNow()+VETO_SECS*1000).toISOString();
                    await supabaseClient.from('auction_state').update({phase:'veto',winning_team:best.constructor,winning_bid:best.cash_bid,winning_swap:best.offered_driver,phase_deadline:deadline}).eq('id',auctionState.id);
                }
            }
            else if(p==='veto'){
                // DEFAULT (driver didn't act): AUTO-ACCEPT the trade.
                const s=auctionState, t=s.target_driver;
                await executeTrade(s.seller_team,s.winning_team,t,s.winning_swap,Number(s.winning_bid));
                await supabaseClient.from('auction_trades').insert([{round_no:s.round_no,target_driver:t,seller_team:s.seller_team,buyer_team:s.winning_team,cash_amount:Number(s.winning_bid),driver_in:s.winning_swap,driver_out:t,outcome:'traded'}]);
                await advanceToNextOrEnd(); _advancing=false; return;
            }
            await refreshAll(); render();
        } finally { _advancing=false; }
    }

    async function advanceToNextOrEnd(){
        await refreshAll();
        const remaining=liveDrivers.filter(d=>!d.locked).length;
        if(remaining<=0){
            await supabaseClient.from('auction_state').update({phase:'complete',phase_deadline:null,is_active:false}).eq('id',auctionState.id);
        } else {
            await supabaseClient.from('auction_state').update({phase:'idle',target_driver:null,seller_team:null,winning_team:null,winning_bid:null,winning_swap:null,phase_deadline:null}).eq('id',auctionState.id);
        }
        await refreshAll(); render();
    }
</script>
